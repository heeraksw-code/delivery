name: 안드로이드 APK 빌드

on:
  workflow_dispatch:        # 깃허브에서 수동 실행 (Actions 탭 → Run workflow)
  push:
    paths:
      - 'capacitor.config.json'
      - 'package.json'
      - 'www/**'
      - '.github/workflows/android-build.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: Node 설치
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Java(JDK 17) 설치
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Android SDK 준비
        uses: android-actions/setup-android@v3

      - name: JS 의존성 설치
        run: npm install

      - name: 안드로이드 플랫폼 추가
        run: npx cap add android

      - name: 동기화
        run: npx cap sync android

      - name: 백그라운드 위치 권한 추가 (AndroidManifest)
        run: |
          M=android/app/src/main/AndroidManifest.xml
          sed -i 's#<application#<uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_BACKGROUND_LOCATION" />\n    <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />\n    <uses-permission android:name="android.permission.FOREGROUND_SERVICE_LOCATION" />\n    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />\n    <application#' "$M"
          echo "===== AndroidManifest.xml ====="
          cat "$M"

      - name: 디버그 APK 빌드
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: APK 업로드 (다운로드용)
        uses: actions/upload-artifact@v4
        with:
          name: 월성푸드배송-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
