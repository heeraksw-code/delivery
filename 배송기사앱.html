<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a3a5c">
<title>배송기사 앱 — 월성푸드</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--blue:#1a3a5c;--green:#27ae60;--red:#e74c3c;--orange:#e67e22;--gray:#f0f2f5;--border:#dee2e6}
body{font-family:'Malgun Gothic',sans-serif;background:var(--gray);font-size:14px;min-height:100vh}
.topbar{background:var(--blue);color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar h1{font-size:16px;font-weight:bold}
.topbar .gear{font-size:20px;cursor:pointer;padding:4px}
.wrap{padding:12px;max-width:480px;margin:0 auto}
.card{background:#fff;border-radius:10px;padding:14px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.card h3{font-size:13px;color:var(--blue);font-weight:bold;margin-bottom:10px;border-bottom:1px solid var(--border);padding-bottom:6px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 18px;border:none;border-radius:8px;font-size:14px;font-weight:bold;cursor:pointer;width:100%;margin-bottom:8px}
.btn-blue{background:var(--blue);color:#fff}
.btn-green{background:var(--green);color:#fff}
.btn-red{background:var(--red);color:#fff}
.btn-orange{background:var(--orange);color:#fff}
.btn-gray{background:#6c757d;color:#fff}
.btn-sm{padding:7px 12px;font-size:12px;width:auto;margin-bottom:0}
.btn:active{opacity:.8}
.row{display:flex;gap:8px}
.row .btn{flex:1}
input,select{width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;margin-bottom:8px}
label{font-size:12px;color:#666;display:block;margin-bottom:3px}

/* 로그인 화면 */
#loginScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:var(--blue)}
#loginScreen .box{background:#fff;border-radius:16px;padding:28px 24px;width:100%;max-width:340px;text-align:center}
#loginScreen h2{color:var(--blue);font-size:20px;margin-bottom:6px}
#loginScreen p{color:#666;font-size:13px;margin-bottom:20px}
.driver-btn{display:block;width:100%;padding:13px;margin-bottom:10px;border:2px solid var(--border);border-radius:10px;background:#fff;font-size:15px;font-weight:bold;cursor:pointer;transition:.15s}
.driver-btn:hover{border-color:var(--blue);background:#f0f4ff}

/* 납품 목록 */
.stop-card{background:#fff;border-radius:10px;margin-bottom:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08);position:relative}
.stop-card.done{opacity:.55}
.stop-header{display:flex;align-items:center;padding:12px 14px;gap:10px;border-bottom:1px solid var(--border)}
.stop-num{width:28px;height:28px;border-radius:50%;background:var(--blue);color:#fff;font-size:13px;font-weight:bold;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.stop-card.done .stop-num{background:#aaa}
.stop-name{font-weight:bold;font-size:15px;flex:1}
.stop-addr{font-size:11px;color:#888;margin-top:2px}
.stop-body{padding:10px 14px}
.stop-item{font-size:13px;color:#444;padding:3px 0;border-bottom:1px solid #f5f5f5}
.stop-item:last-child{border-bottom:none}
.stop-actions{display:flex;gap:8px;padding:10px 14px;background:#fafafa}
.done-badge{position:absolute;top:10px;right:10px;background:var(--green);color:#fff;font-size:11px;font-weight:bold;padding:3px 8px;border-radius:12px}

/* 창고 카드 */
.warehouse-card{border:2px solid var(--orange);background:#fff9f0}
.warehouse-card .stop-num{background:var(--orange)}

/* 상태바 */
.status-bar{background:var(--blue);color:#fff;padding:8px 16px;font-size:12px;display:flex;justify-content:space-between;align-items:center}
.gps-dot{width:8px;height:8px;border-radius:50%;background:#aaa;display:inline-block;margin-right:5px}
.gps-dot.on{background:#2ecc71;animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* 설정 모달 */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200}
.modal-overlay.open{display:flex;align-items:flex-end;justify-content:center}
.modal-box{background:#fff;border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto}
.modal-box h3{font-size:16px;font-weight:bold;margin-bottom:16px}
.modal-close{float:right;background:none;border:none;font-size:22px;cursor:pointer;color:#999}

/* 경고 배너 */
.banner{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:10px}
.banner-warn{background:#fff3cd;color:#856404;border:1px solid #ffc107}
.banner-ok{background:#d4edda;color:#155724;border:1px solid #c3e6cb}
.banner-err{background:#f8d7da;color:#721c24;border:1px solid #f5c6cb}

/* 빈 화면 */
.empty{text-align:center;padding:40px 20px;color:#aaa}
.empty .icon{font-size:48px;margin-bottom:10px}

.progress-bar{height:6px;background:#e0e0e0;border-radius:3px;margin:8px 0}
.progress-fill{height:100%;background:var(--green);border-radius:3px;transition:.3s}
</style>
</head>
<body>

<!-- ─── 로그인 화면 ─── -->
<div id="loginScreen">
  <div class="box">
    <div style="font-size:40px;margin-bottom:8px">🚚</div>
    <h2>월성푸드 배송</h2>
    <p>기사님 이름을 선택하세요</p>
    <div id="driverList"></div>
    <div style="margin-top:16px;border-top:1px solid #eee;padding-top:16px">
      <input type="text" id="newDriverName" placeholder="직접 입력..." style="margin-bottom:8px">
      <button class="btn btn-blue" onclick="loginWithName(document.getElementById('newDriverName').value)">확인</button>
    </div>
  </div>
</div>

<!-- ─── 메인 화면 ─── -->
<div id="mainScreen" style="display:none">
  <div class="topbar">
    <div>
      <div style="font-size:12px;opacity:.7">월성푸드 배송</div>
      <div id="driverNameDisplay" style="font-size:16px;font-weight:bold"></div>
    </div>
    <span class="gear" onclick="openSettings()">⚙️</span>
  </div>

  <div class="status-bar">
    <span><span class="gps-dot" id="gpsDot"></span><span id="gpsStatus">GPS 꺼짐</span></span>
    <span id="progressText">0/0 완료</span>
  </div>

  <div class="wrap">
    <!-- 날짜 + 불러오기 -->
    <div class="card">
      <div class="row" style="align-items:flex-end">
        <div style="flex:1">
          <label>납품일</label>
          <input type="date" id="dateInput">
        </div>
        <button class="btn btn-blue btn-sm" style="margin-bottom:8px;flex:0 0 auto;padding:10px 16px" onclick="loadOrders()">불러오기</button>
      </div>
      <div class="row">
        <button class="btn btn-orange btn-sm" onclick="optimizeRoute()">⚡ 경로 최적화</button>
        <button class="btn btn-gray btn-sm" onclick="toggleGps()">📍 GPS <span id="gpsToggleLabel">켜기</span></button>
      </div>
      <div class="row">
        <button class="btn btn-sm" style="background:#16a085;color:#fff" onclick="toggleMap()">🗺️ <span id="mapToggleLabel">지도 보기</span></button>
        <button class="btn btn-sm" style="background:#3b5b86;color:#fff" onclick="batchNavi()">🧭 묶음 내비</button>
      </div>
      <!-- 차수(다회전) 필터 -->
      <div class="row" style="gap:0;border:1px solid #dde;border-radius:8px;overflow:hidden">
        <button id="trip-all" class="trip-btn" onclick="setTrip('all')" style="flex:1;border:none;padding:8px;background:#1a3a5c;color:#fff;font-size:12px;font-weight:bold;cursor:pointer">전체</button>
        <button id="trip-am" class="trip-btn" onclick="setTrip('am')" style="flex:1;border:none;padding:8px;background:#fff;color:#555;font-size:12px;cursor:pointer">🌅 오전차</button>
        <button id="trip-pm" class="trip-btn" onclick="setTrip('pm')" style="flex:1;border:none;padding:8px;background:#fff;color:#555;font-size:12px;cursor:pointer">🌆 오후차</button>
      </div>
    </div>

    <!-- 경로 지도 (개요용) -->
    <div id="mapPanel" style="display:none;margin-bottom:12px;border-radius:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.1)">
      <div id="driverMap" style="width:100%;height:320px;background:#e8ecf0"></div>
      <div id="mapHint" style="display:none;padding:16px;background:#fff3cd;color:#856404;font-size:13px;text-align:center;line-height:1.6">
        지도를 보려면 ⚙️ 설정에서<br><b>카카오 JavaScript 키</b>를 입력하세요.
      </div>
    </div>

    <div id="bannerArea"></div>
    <div id="stopList"></div>
  </div>
</div>

<!-- ─── 설정 모달 ─── -->
<div class="modal-overlay" id="settingsModal" onclick="if(event.target===this)closeSettings()">
  <div class="modal-box">
    <button class="modal-close" onclick="closeSettings()">✕</button>
    <h3>⚙️ 설정</h3>

    <label>출발지 주소 (회사)</label>
    <input type="text" id="cfg_depot" placeholder="예: 경기도 안성시 공도읍...">

    <label>보세창고 이름</label>
    <input type="text" id="cfg_wh_name" placeholder="예: OO냉동창고">

    <label>보세창고 주소</label>
    <input type="text" id="cfg_wh_addr" placeholder="보세창고 주소">

    <label>창고 이용 가능 시간 (오전 마감)</label>
    <input type="time" id="cfg_wh_close" value="11:20">
    <small style="color:#888;font-size:11px;display:block;margin:-4px 0 8px">이 시각 이후 ~ 13:00 사이 도착은 점심시간 겹침 경고</small>

    <label style="display:flex;align-items:center;gap:8px;cursor:pointer;margin-bottom:8px">
      <input type="checkbox" id="cfg_auto_done" style="width:18px;height:18px"> 자동 납품완료 (거래처 도착 시 자동 처리)
    </label>
    <small style="color:#888;font-size:11px;display:block;margin:-4px 0 8px">GPS가 켜져 있어야 작동 · 거래처 120m 안에 멈추면 자동 완료</small>

    <label>카카오맵 REST API 키 (주소→좌표 변환용)</label>
    <input type="text" id="cfg_kakao_key" placeholder="REST API 키 입력">

    <label>카카오맵 JavaScript 키 (지도 표시용)</label>
    <input type="text" id="cfg_kakao_js_key" placeholder="JavaScript 키 입력 (지도 보려면 필요)">

    <label>기사 목록 (줄바꿈으로 구분)</label>
    <textarea id="cfg_drivers" rows="4" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:8px;font-size:14px;margin-bottom:8px" placeholder="홍길동&#10;김배달&#10;이드라이버"></textarea>

    <button class="btn btn-blue" onclick="saveSettings()">💾 저장</button>
    <button class="btn btn-red" style="margin-top:6px" onclick="logout()">로그아웃</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js"></script>
<script>
// ═══ Supabase 연결 ═══════════════════════════════
const SUPABASE_URL  = 'https://bjerikppbvbjlwptzfkn.supabase.co';
const ANON_KEY      = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJqZXJpa3BwYnZiamx3cHR6ZmtuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNjgzMzgsImV4cCI6MjA5Njg0NDMzOH0.XU6vYjZ6Vc0-f-TfQwkx1D7hNdMXspeRttt_HtacL-A';
const sb = supabase.createClient(SUPABASE_URL, ANON_KEY);

// ═══ 상태 ════════════════════════════════════════
let DRIVER = '';
let STOPS  = [];       // [{clientName, address, lat, lng, items, done, warehouseHere}]
let GPS_ID = null;
let CUR_LAT = null, CUR_LNG = null;
let GPS_SEND_TIMER = null;
const esc = s => String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

// ═══ 설정 로드 ════════════════════════════════════
// 카카오 키 기본값(앱에 내장) — 기기마다 설정에 안 넣어도 지도·길찾기 바로 작동.
//   JS키: 카카오맵 JS SDK는 원래 키가 페이지에 노출되는 구조 + 도메인(github.io) 제한으로 보호됨.
//   REST키: 카카오맵 사용설정 ON + 쿼터 제한으로 보호. (설정에 직접 넣으면 그 값이 우선)
const EMBEDDED_KEYS = {
  kakao_js_key: '7b3c60bf69c00e12f42af52360a23955'   // JS키만 내장(도메인 제한 보호). REST키는 공개노출 위험이라 제외.
};
function cfg(key, def) { try { return localStorage.getItem('dlv_' + key) || EMBEDDED_KEYS[key] || def; } catch(e) { return EMBEDDED_KEYS[key] || def; } }
function cfgSet(key, val) { try { localStorage.setItem('dlv_' + key, val); } catch(e) {} }

// ═══ 로그인 ═══════════════════════════════════════
function initLogin() {
  const saved = cfg('driver', '');
  if (saved) { login(saved); return; }

  const drivers = (cfg('drivers', '홍길동\n김드라이버')).split('\n').map(s=>s.trim()).filter(Boolean);
  let html = '';
  drivers.forEach(d => {
    html += `<button class="driver-btn" onclick="loginWithName('${esc(d)}')">${esc(d)}</button>`;
  });
  document.getElementById('driverList').innerHTML = html;
}

function loginWithName(name) {
  if (!name || !name.trim()) { alert('이름을 입력하세요'); return; }
  login(name.trim());
}

function login(name) {
  DRIVER = name;
  cfgSet('driver', name);
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('mainScreen').style.display = 'block';
  document.getElementById('driverNameDisplay').textContent = name + ' 기사님';

  const today = new Date();
  const yyyy = today.getFullYear();
  const mm = String(today.getMonth()+1).padStart(2,'0');
  const dd = String(today.getDate()).padStart(2,'0');
  document.getElementById('dateInput').value = `${yyyy}-${mm}-${dd}`;

  loadOrders();
}

function logout() {
  cfgSet('driver', '');
  stopGps();
  DRIVER = '';
  STOPS = [];
  document.getElementById('mainScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  initLogin();
  closeSettings();
}

// 주문 거래처명 ↔ 배송DB 거래처명 매칭 (풀네임 차이 보정)
//  예: 주문 "명품가마" ↔ 배송DB "명품가마 닭칼국수"
function matchCustomer(orderName, customers) {
  // 1) 정확 일치
  let m = customers.find(c => c.name === orderName);
  if (m) return m;
  // 2) 한쪽이 다른쪽으로 시작 (접두 차이) — 가장 흔한 경우
  let cands = customers.filter(c => c.name.startsWith(orderName) || orderName.startsWith(c.name));
  if (cands.length >= 1) {
    cands.sort((a, b) => Math.abs(a.name.length - orderName.length) - Math.abs(b.name.length - orderName.length));
    return cands[0];
  }
  // 3) 공백 제거 후 포함 관계 (한쪽이 다른쪽을 품고 있으면)
  const norm = s => String(s).replace(/\s/g, '');
  const on = norm(orderName);
  cands = customers.filter(c => { const cn = norm(c.name); return cn.includes(on) || on.includes(cn); });
  if (cands.length === 1) return cands[0];
  return null;
}

// ═══ 주문 불러오기 ════════════════════════════════
async function loadOrders() {
  const date = document.getElementById('dateInput').value;
  if (!date) { showBanner('날짜를 선택하세요', 'warn'); return; }

  showBanner('불러오는 중...', 'ok');

  try {
    // 1) work_order(헤더)에서 해당 날짜 주문 조회 — 거래처명·납품일은 헤더에 있음
    const { data: headers, error: e1 } = await sb
      .from('work_order')
      .select('id, client_name, delivery_date, status')
      .eq('delivery_date', date);
    if (e1) throw e1;

    const validHeaders = (headers || []).filter(h => h.status !== 'cancelled');

    if (validHeaders.length === 0) {
      showBanner(`${date} 납품 없음 — 작업지시서에서 주문을 먼저 입력하세요`, 'warn');
      STOPS = [];
      renderStops();
      return;
    }

    // 2) work_order_line(품목)을 order_id로 조회
    const orderIds = validHeaders.map(h => h.id);
    const { data: lines, error: e2 } = await sb
      .from('work_order_line')
      .select('order_id, raw_name, order_qty, unit, work_state')
      .in('order_id', orderIds);
    if (e2) throw e2;

    // 3) 거래처별로 묶기 (order_id → 거래처명 매핑 후 품목 그룹화)
    const idToClient = {};
    validHeaders.forEach(h => { idToClient[h.id] = h.client_name; });

    const clientMap = {};
    (lines || []).forEach(l => {
      const cn = idToClient[l.order_id];
      if (!cn) return;
      if (!clientMap[cn]) clientMap[cn] = [];
      clientMap[cn].push({ name: l.raw_name, qty: l.order_qty, unit: l.unit });
    });
    // 품목이 하나도 없는 거래처도 표시되도록 헤더 기준으로 빈 배열 보장
    validHeaders.forEach(h => { if (!clientMap[h.client_name]) clientMap[h.client_name] = []; });

    // 3) 주소 조회 — 전체 거래처를 받아 똑똑하게 매칭 (풀네임 차이 보정)
    //    select('*') 로 받아 배송메모(delivery_note) 컬럼이 있으면 같이 가져옴
    const clientNames = Object.keys(clientMap);
    const { data: allCusts } = await sb
      .from('delivery_customers')
      .select('*');
    const custList = allCusts || [];

    // 4) 기존 처리 기록 조회 (완료/부재/반품/일부 + 사유)
    const { data: logs } = await sb
      .from('delivery_logs')
      .select('*')
      .eq('session_date', date)
      .eq('driver_name', DRIVER);

    const resultMap = {};
    (logs || []).forEach(l => { resultMap[l.client_name] = { result: l.result || 'done', reason: l.reason || '' }; });
    const donSet = new Set(Object.keys(resultMap));

    // 5) STOPS 배열 구성
    STOPS = clientNames.map(cn => {
      const a = matchCustomer(cn, custList) || {};
      return {
        clientName: cn,
        dbName: a.name || cn,              // 배송DB의 실제 이름(메모 저장용)
        address: a.address || '주소 미등록',
        lat: a.lat || null,
        lng: a.lng || null,
        note: a.delivery_note || '',        // 배송 메모(뒷문·주차 등)
        tw: a.delivery_time_window || '',   // 배송 시간대 (am/pm/'')
        phone: a.phone || '',               // 전화번호
        items: clientMap[cn],
        done: donSet.has(cn),
        result: (resultMap[cn] && resultMap[cn].result) || '',
        reason: (resultMap[cn] && resultMap[cn].reason) || '',
        warehouseHere: false
      };
    });

    // 미완료 먼저, 완료는 뒤로
    STOPS.sort((a, b) => (a.done ? 1 : 0) - (b.done ? 1 : 0));

    // 창고 추가 (설정에 있으면)
    const whName = cfg('wh_name', '');
    const whAddr = cfg('wh_addr', '');
    if (whName) {
      const whDone = donSet.has(whName);
      STOPS.push({
        clientName: whName,
        address: whAddr || '주소 미등록',
        lat: null, lng: null,
        items: [{ name: '보세창고 픽업', qty: '', unit: '' }],
        done: whDone,
        warehouseHere: true
      });
      // 창고 시간 판단
      checkWarehouseTiming();
    }

    clearBanner();
    renderStops();

    const noAddr = STOPS.filter(s => s.address === '주소 미등록' && !s.warehouseHere).length;
    if (noAddr > 0) {
      showBanner(`⚠️ ${noAddr}곳 주소 미등록 — 주소동기화.py를 실행하거나 수동 설정 필요`, 'warn');
    }

  } catch(e) {
    showBanner('오류: ' + (e.message || e), 'err');
  }
}

// ═══ 창고 시간 판단 ════════════════════════════════
function checkWarehouseTiming() {
  const whClose = cfg('wh_close', '11:20');
  const [h, m] = whClose.split(':').map(Number);
  const closeMin = h * 60 + m;
  const reOpenMin = 13 * 60;
  const nowMin = new Date().getHours() * 60 + new Date().getMinutes();

  if (nowMin >= closeMin && nowMin < reOpenMin) {
    showBanner(`⚠️ 지금은 창고 점심시간입니다 (${whClose}~13:00). 창고는 13:00 이후에 방문하세요.`, 'warn');
  }
}

// ═══ 경로 최적화 ═══════════════════════════════════
async function optimizeRoute() {
  const kakaoKey = cfg('kakao_key', '');
  const pendingStops = STOPS.filter(s => !s.done && !s.warehouseHere);
  const warehouse = STOPS.find(s => s.warehouseHere);

  // 좌표 없는 곳 변환 (거래처 + 창고)
  if (kakaoKey) {
    const toGeo = [...pendingStops];
    if (warehouse && (!warehouse.lat || !warehouse.lng) && warehouse.address && warehouse.address !== '주소 미등록') toGeo.push(warehouse);
    if (toGeo.some(s => !s.lat || !s.lng)) {
      showBanner('주소를 좌표로 변환 중...', 'ok');
      await geocodeAll(toGeo, kakaoKey);
    }
  }

  const withCoord = pendingStops.filter(s => s.lat && s.lng);
  const noCoordList = pendingStops.filter(s => !s.lat || !s.lng);

  if (withCoord.length < 2) {
    showBanner('좌표가 등록된 거래처가 2곳 미만 — 순서를 수동으로 조정하거나 주소동기화 후 카카오 API 키를 설정하세요', 'warn');
    return;
  }

  // TSP 최적화 (좌표 있는 것만): 출발지 기준 최근접이웃 → 2-opt로 갈지자 펴기
  const depot = await resolveDepot(kakaoKey, withCoord);
  let optimized = nearestNeighborTSP(withCoord, depot);
  optimized = twoOpt(optimized, depot);

  // 시간대 적용: 오전 거래처 먼저 → 무관 → 오후 거래처 마지막 (각 그룹 안에서는 최적 순서 유지)
  const rank = s => (s.tw === 'am' ? 0 : s.tw === 'pm' ? 2 : 1);
  optimized = optimized.slice().sort((a, b) => rank(a) - rank(b));  // 안정정렬

  // 좌표 없는 거래처는 맨 뒤로, 창고는 항상 마지막에 배치
  const reordered = [...optimized, ...noCoordList];
  if (warehouse) {
    STOPS = [...reordered, warehouse];
  } else {
    STOPS = reordered;
  }

  renderStops();

  // 실제 도로 경로 + 도착예정시간 계산 (카카오 길찾기 API)
  showBanner('실제 도로 경로·도착시간 계산 중...', 'ok');
  await applyRoadRouteAndETA(depot);
  renderStops();
  if (document.getElementById('mapPanel').style.display !== 'none' && DMAP) renderDriverMap();

  // 결과 안내
  const depotSrc = (CUR_LAT && CUR_LNG) ? '현재 위치' : (cfg('depot_addr','') ? '회사 출발지' : '거래처 중심');
  let msg = `✅ 경로 완료 — ${depotSrc} 기준 ${withCoord.length}곳`;
  if (noCoordList.length > 0) msg += ` (${noCoordList.length}곳 좌표없어 뒤에)`;
  const lastEta = [...STOPS].reverse().find(s => s.eta);
  if (lastEta) msg += ` · 마지막 도착 ${fmtTime(lastEta.eta)} 예상`;
  showBanner(msg, 'ok');

  // 창고 점심시간 경고 (정확한 도착예정시간 기준)
  const whClose = cfg('wh_close', '11:20');
  const [h, m] = whClose.split(':').map(Number);
  if (warehouse && warehouse.eta) {
    const wm = warehouse.eta.getHours() * 60 + warehouse.eta.getMinutes();
    if (wm >= (h*60+m) && wm < 13*60) {
      showBanner(`⚠️ 창고 도착 예상 ${fmtTime(warehouse.eta)} — 점심시간(${whClose}~13:00)과 겹칩니다. 13:00 이후 방문하거나 순서를 조정하세요.`, 'warn');
    }
  }
}

function fmtTime(d) { return d.getHours() + ':' + String(d.getMinutes()).padStart(2, '0'); }

// ═══ 실제 도로 경로 + 도착예정시간 ═══════════════════
let ROAD_PATH = null;          // 카카오 길찾기로 받은 실제 도로 좌표
const SERVICE_MIN = 5;         // 거래처당 하차·납품 소요(분) — 도착시간에 반영

async function applyRoadRouteAndETA(depot) {
  ROAD_PATH = null;
  STOPS.forEach(s => { s.eta = null; });

  // 순서대로, 좌표 있고 미완료인 정류장 (창고 포함)
  const route = STOPS.filter(s => s.lat && s.lng && !s.done);
  if (route.length < 1 || route.length > 30) return;   // 30 초과면 직선 유지(카카오 한도)

  const kakaoKey = cfg('kakao_key', '');
  if (!kakaoKey) return;

  const origin = { x: depot.lng, y: depot.lat };
  const destination = { x: route[route.length-1].lng, y: route[route.length-1].lat };
  const waypoints = route.slice(0, -1).map(s => ({ x: s.lng, y: s.lat }));

  try {
    const res = await fetch('https://apis-navi.kakaomobility.com/v1/waypoints/directions', {
      method: 'POST',
      headers: { 'Authorization': 'KakaoAK ' + kakaoKey, 'Content-Type': 'application/json' },
      body: JSON.stringify({ origin, destination, waypoints, priority: 'RECOMMEND' })
    });
    if (!res.ok) return;
    const data = await res.json();
    const r = data.routes && data.routes[0];
    if (!r || r.result_code !== 0) return;

    // 1) 실제 도로 좌표 모으기 (vertexes: [x,y,x,y,...])
    const path = [];
    (r.sections || []).forEach(sec => {
      (sec.roads || []).forEach(rd => {
        const v = rd.vertexes || [];
        for (let i = 0; i + 1 < v.length; i += 2) path.push({ lat: v[i+1], lng: v[i] });
      });
    });
    if (path.length >= 2) ROAD_PATH = path;

    // 2) 구간 소요시간 → 누적 도착예정시간 (운전시간 + 앞 정류장 하차시간)
    const now = Date.now();
    let cum = 0;
    (r.sections || []).forEach((sec, i) => {
      cum += (sec.duration || 0);
      if (route[i]) route[i].eta = new Date(now + (cum + i * SERVICE_MIN * 60) * 1000);
    });
  } catch (e) { /* 실패 시 직선·시간없음으로 폴백 */ }
}

// 출발지(시작점) 좌표 결정 — 가까운 순서의 기준점
//  우선순위: ① GPS 현재 위치(지금 있는 곳 기준) ② 설정의 회사 주소 ③ 거래처들의 중심점
async function resolveDepot(kakaoKey, stops) {
  // ① GPS가 켜져 있으면 현재 위치를 출발지로 (지금 있는 곳에서 가까운 순으로 정렬됨)
  if (CUR_LAT && CUR_LNG) return { lat: CUR_LAT, lng: CUR_LNG };

  // ② 설정에 입력한 회사(출발지) 주소 — 한 번 변환해서 캐시
  const cLat = parseFloat(cfg('depot_lat', '')), cLng = parseFloat(cfg('depot_lng', ''));
  if (!isNaN(cLat) && !isNaN(cLng)) return { lat: cLat, lng: cLng };
  const depotAddr = cfg('depot_addr', '');
  if (depotAddr && kakaoKey) {
    try {
      const res = await fetch(
        `https://dapi.kakao.com/v2/local/search/address.json?query=${encodeURIComponent(depotAddr)}`,
        { headers: { Authorization: 'KakaoAK ' + kakaoKey } }
      );
      const data = await res.json();
      if (data.documents && data.documents.length > 0) {
        const lat = parseFloat(data.documents[0].y), lng = parseFloat(data.documents[0].x);
        cfgSet('depot_lat', lat); cfgSet('depot_lng', lng);
        return { lat, lng };
      }
    } catch (e) {}
  }

  // ③ 최후 폴백: 거래처 좌표들의 평균(중심점) — 엉뚱한 곳에서 시작하지 않도록
  const valid = stops.filter(s => s.lat && s.lng);
  const lat = valid.reduce((a, s) => a + s.lat, 0) / valid.length;
  const lng = valid.reduce((a, s) => a + s.lng, 0) / valid.length;
  return { lat, lng };
}

// 카카오 주소→좌표 변환
async function geocodeAll(stops, apiKey) {
  for (const stop of stops) {
    if (stop.lat && stop.lng) continue;
    if (!stop.address || stop.address === '주소 미등록') continue;
    try {
      const res = await fetch(
        `https://dapi.kakao.com/v2/local/search/address.json?query=${encodeURIComponent(stop.address)}`,
        { headers: { Authorization: 'KakaoAK ' + apiKey } }
      );
      const data = await res.json();
      if (data.documents && data.documents.length > 0) {
        stop.lng = parseFloat(data.documents[0].x);
        stop.lat = parseFloat(data.documents[0].y);
        // Supabase에도 저장
        await sb.from('delivery_customers')
          .update({ lat: stop.lat, lng: stop.lng })
          .eq('name', stop.clientName);
      }
    } catch(e) {}
    await new Promise(r => setTimeout(r, 100)); // rate limit
  }
}

// ═══ TSP — 최근접 이웃 ══════════════════════════════
function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2-lat1) * Math.PI/180;
  const dLng = (lng2-lng1) * Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function nearestNeighborTSP(stops, depot) {
  if (stops.length <= 1) return stops;
  const unvisited = [...stops];
  const route = [];
  let cur = depot;
  while (unvisited.length > 0) {
    let best = -1, bestDist = Infinity;
    unvisited.forEach((s, i) => {
      const d = haversine(cur.lat, cur.lng, s.lat, s.lng);
      if (d < bestDist) { bestDist = d; best = i; }
    });
    route.push(unvisited[best]);
    cur = unvisited[best];
    unvisited.splice(best, 1);
  }
  return route;
}

// 경로 전체 거리 (출발지 → 첫 거래처 → ... → 마지막, 돌아오지 않는 열린 경로)
function routeDistance(route, depot) {
  if (route.length === 0) return 0;
  let total = haversine(depot.lat, depot.lng, route[0].lat, route[0].lng);
  for (let i = 0; i < route.length - 1; i++) {
    total += haversine(route[i].lat, route[i].lng, route[i+1].lat, route[i+1].lng);
  }
  return total;
}

// 2-opt 개선 — 최근접이웃이 만든 갈지자/교차 구간을 뒤집어가며 총거리를 줄임
function twoOpt(route, depot) {
  if (route.length < 4) return route;
  let best = route.slice();
  let bestDist = routeDistance(best, depot);
  let improved = true;
  let guard = 0; // 안전장치 (무한루프 방지)
  while (improved && guard++ < 50) {
    improved = false;
    for (let i = 0; i < best.length - 1; i++) {
      for (let k = i + 1; k < best.length; k++) {
        const cand = best.slice(0, i).concat(best.slice(i, k + 1).reverse(), best.slice(k + 1));
        const d = routeDistance(cand, depot);
        if (d < bestDist - 1e-9) {
          best = cand; bestDist = d; improved = true;
        }
      }
    }
  }
  return best;
}

// ═══ 네비게이션 연동 ════════════════════════════════
function openKakaoNavi(lat, lng, name) {
  if (!lat || !lng) {
    // 좌표 없으면 주소로 검색
    const url = `https://map.kakao.com/link/search/${encodeURIComponent(name)}`;
    window.open(url, '_blank');
    return;
  }
  // 카카오맵 URL 스킴 (앱 연동)
  const scheme = `kakaomap://route?ep=${lat},${lng}&by=CAR`;
  window.location.href = scheme;
  // 폴백: 앱 없으면 웹 지도
  setTimeout(() => {
    window.open(`https://map.kakao.com/link/to/${encodeURIComponent(name)},${lat},${lng}`, '_blank');
  }, 1500);
}

function openTmap(lat, lng, name) {
  if (!lat || !lng) {
    window.open(`https://www.google.com/maps/search/${encodeURIComponent(name)}`, '_blank');
    return;
  }
  const scheme = `tmap://route?goalname=${encodeURIComponent(name)}&goalx=${lng}&goaly=${lat}`;
  window.location.href = scheme;
  setTimeout(() => {
    window.open(`https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}&travelmode=driving`, '_blank');
  }, 1500);
}

// ═══ 묶음 내비 — 다음 최대 4곳(경유 3 + 도착 1)을 카카오내비에 한 번에 ═══
function batchNavi() {
  const jsKey = cfg('kakao_js_key', '');
  if (!jsKey) { showBanner('⚙️ 설정에서 카카오 JavaScript 키를 먼저 입력하세요', 'warn'); return; }
  if (typeof Kakao === 'undefined') { showBanner('카카오 SDK 로딩 중 — 잠시 후 다시 눌러주세요', 'warn'); return; }
  if (!Kakao.isInitialized()) { try { Kakao.init(jsKey); } catch(e) {} }

  const pending = STOPS.filter(s => s.lat && s.lng && !s.done);
  if (pending.length === 0) { showBanner('안내할 남은 거래처가 없습니다', 'warn'); return; }

  const batch = pending.slice(0, 4);              // 카카오내비 경유지 최대 3 + 도착 1
  const dest = batch[batch.length - 1];
  const viaList = batch.slice(0, -1).map(s => ({ name: s.clientName, x: s.lng, y: s.lat, coordType: 'wgs84' }));

  try {
    Kakao.Navi.start({
      name: dest.clientName, x: dest.lng, y: dest.lat, coordType: 'wgs84',
      viaList: viaList.length ? viaList : undefined
    });
    showBanner(`🧭 다음 ${batch.length}곳 안내 시작 (${batch.map(s=>s.clientName).join(' → ')})`, 'ok');
  } catch(e) {
    showBanner('내비 실행 실패 — 핸드폰에 카카오내비 앱이 설치돼 있어야 합니다', 'err');
  }
}

// ═══ 처리(완료/부재/반품/일부) 기록 ═══════════════════
const RESULT_LABEL = { done: '납품완료', absent: '부재중', return: '반품', partial: '일부만' };
const RESULT_COLOR = { done: '#27ae60', absent: '#e67e22', return: '#e74c3c', partial: '#2980b9' };

async function recordResult(idx, result, reason, auto) {
  const stop = STOPS[idx];
  if (stop.done) return;
  const date = document.getElementById('dateInput').value;
  stop.done = true;
  stop.result = result;
  stop.reason = reason || '';
  try {
    await sb.from('delivery_logs').insert({
      session_date: date, driver_name: DRIVER, client_name: stop.clientName,
      lat: CUR_LAT, lng: CUR_LNG, result: result, reason: reason || ''
    });
  } catch(e) { console.warn('기록 저장 실패:', e.message); }
  renderStops();
  updateProgress();
  const ok = (result === 'done');
  showBanner(`${ok ? '✅' : '⚠️'} ${stop.clientName} ${RESULT_LABEL[result] || result}${auto ? ' (자동)' : ''}`, ok ? 'ok' : 'warn');
}

// 납품완료 (버튼·자동도착에서 호출)
function markDone(idx, auto) { recordResult(idx, 'done', '', auto); }

// 문제 처리: 부재중 / 반품 / 일부만 + 사유
function markProblem(idx) {
  const stop = STOPS[idx];
  const choice = prompt(`[${stop.clientName}] 처리 상태를 숫자로:\n  1) 부재중\n  2) 반품\n  3) 일부만 배송`, '');
  if (!choice) return;
  const result = { '1': 'absent', '2': 'return', '3': 'partial' }[choice.trim()];
  if (!result) { showBanner('1, 2, 3 중에서 선택하세요', 'warn'); return; }
  const reason = (prompt('사유 (선택 — 예: 문 잠김 / 거래처 요청 / 수량 부족)', '') || '').trim();
  recordResult(idx, result, reason);
}

// 자동 납품완료 — 현재 위치가 미완료 거래처 반경 안에 들어오면 자동 처리
const AUTO_DONE_RADIUS_M = 120;   // 도착 인정 반경(m)
function checkAutoArrival() {
  if (cfg('auto_done', 'on') !== 'on') return;
  if (CUR_LAT == null || CUR_LNG == null) return;
  // 빠르게 이동 중이면(그냥 지나가는 중) 자동완료 금지
  if (CUR_SPEED != null && CUR_SPEED > 3) return;   // 3 m/s ≈ 약 11km/h
  STOPS.forEach((s, idx) => {
    if (s.done || !s.lat || !s.lng) return;
    const dM = haversine(CUR_LAT, CUR_LNG, s.lat, s.lng) * 1000;
    if (dM <= AUTO_DONE_RADIUS_M) markDone(idx, true);
  });
}

// ═══ 차수(다회전) 필터 ════════════════════════════════
let TRIP_FILTER = 'all';   // all | am | pm
function setTrip(t) {
  TRIP_FILTER = t;
  ['all','am','pm'].forEach(k => {
    const b = document.getElementById('trip-' + k);
    if (!b) return;
    const on = (k === t);
    b.style.background = on ? '#1a3a5c' : '#fff';
    b.style.color = on ? '#fff' : '#555';
    b.style.fontWeight = on ? 'bold' : 'normal';
  });
  renderStops();
  if (document.getElementById('mapPanel').style.display !== 'none' && DMAP) renderDriverMap();
}
// 이 정류장이 현재 차수 필터에 보이는가
function tripMatch(s) {
  if (TRIP_FILTER === 'all') return true;
  if (s.warehouseHere) return TRIP_FILTER === 'pm';   // 창고는 오후차에만(보통 마지막)
  return s.tw === TRIP_FILTER;                          // 오전차=am, 오후차=pm (무관은 전체에서만)
}

// ═══ 렌더링 ══════════════════════════════════════════
function renderStops() {
  const list = document.getElementById('stopList');
  if (STOPS.length === 0) {
    list.innerHTML = '<div class="empty"><div class="icon">📦</div><div>납품 목록이 없습니다<br><small>날짜를 선택하고 [불러오기]를 누르세요</small></div></div>';
    return;
  }

  let num = 0;
  let html = '';
  let shown = 0;
  STOPS.forEach((stop, idx) => {
    if (!tripMatch(stop)) return;   // 차수 필터
    shown++;
    if (!stop.done) num++;
    const displayNum = stop.done ? '✓' : num;
    const isWH = stop.warehouseHere;
    html += `<div class="stop-card ${stop.done?'done':''} ${isWH?'warehouse-card':''}">`;
    if (stop.done) {
      const rs = stop.result || 'done';
      html += `<div class="done-badge" style="background:${RESULT_COLOR[rs] || '#27ae60'}">${RESULT_LABEL[rs] || '납품완료'}${stop.reason ? ' · ' + esc(stop.reason) : ''}</div>`;
    }
    const etaTag = (!stop.done && stop.eta)
      ? `<span style="background:#eaf2ff;color:#2563eb;font-size:11px;font-weight:bold;padding:2px 8px;border-radius:10px;white-space:nowrap">🕐 ${fmtTime(stop.eta)} 도착예정</span>`
      : '';
    // 순서 위/아래 조정 버튼 (미완료·창고아닐 때만)
    const reorder = (!stop.done && !isWH)
      ? `<div style="display:flex;flex-direction:column;gap:2px;margin-left:auto">
           <button onclick="moveStop(${idx},-1)" title="위로" style="border:none;background:#eef1f5;border-radius:5px;width:30px;height:22px;cursor:pointer;font-size:12px">▲</button>
           <button onclick="moveStop(${idx},1)" title="아래로" style="border:none;background:#eef1f5;border-radius:5px;width:30px;height:22px;cursor:pointer;font-size:12px">▼</button>
         </div>` : '';
    // 오전/오후 시간대 태그 (눌러서 무관→오전→오후 순환)
    const twInfo = { am: ['🌅오전','#e67e22'], pm: ['🌆오후','#8e44ad'] }[stop.tw];
    const twTag = (!isWH)
      ? (twInfo
          ? `<span onclick="cycleTimeWindow(${idx})" style="background:${twInfo[1]};color:#fff;font-size:11px;font-weight:bold;padding:2px 8px;border-radius:10px;cursor:pointer">${twInfo[0]}</span>`
          : `<span onclick="cycleTimeWindow(${idx})" style="background:#eee;color:#999;font-size:11px;padding:2px 8px;border-radius:10px;cursor:pointer">⏰시간대</span>`)
      : '';
    html += `<div class="stop-header">
      <div class="stop-num">${displayNum}</div>
      <div style="flex:1">
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
          <div class="stop-name">${isWH?'🏭 ':''} ${esc(stop.clientName)}</div>
          ${twTag}
          ${etaTag}
        </div>
        <div class="stop-addr">📍 ${esc(stop.address)}
          ${!isWH && !stop.done ? `<span onclick="fixLocation(${idx})" style="color:#3498db;font-size:11px;cursor:pointer;margin-left:6px">[위치수정]</span>` : ''}
        </div>
      </div>
      ${reorder}
    </div>`;
    // 배송 메모 (뒷문·주차·시간대 등) — 있으면 노란 박스, 없으면 흐린 추가 버튼
    if (!isWH) {
      if (stop.note) {
        html += `<div onclick="editNote(${idx})" style="margin:0 14px 8px;padding:8px 10px;background:#fff8e1;border:1px solid #ffe082;border-radius:8px;font-size:13px;color:#8a6d00;cursor:pointer">📌 ${esc(stop.note)} <span style="color:#bbb;font-size:11px">(눌러서 수정)</span></div>`;
      } else if (!stop.done) {
        html += `<div onclick="editNote(${idx})" style="margin:0 14px 8px;font-size:12px;color:#aaa;cursor:pointer">＋ 배송 메모 추가 (뒷문·주차·시간대 등)</div>`;
      }
    }
    html += '<div class="stop-body">';
    stop.items.forEach(it => {
      html += `<div class="stop-item">• ${esc(it.name)} ${it.qty?esc(it.qty):''}${it.unit?esc(it.unit):''}</div>`;
    });
    html += '</div>';
    if (!stop.done) {
      const callBtn = stop.phone
        ? `<a class="btn btn-sm" href="tel:${esc(stop.phone.replace(/[^0-9+]/g,''))}" style="background:#16a085;color:#fff;text-decoration:none">📞 전화</a>` : '';
      html += `<div class="stop-actions">
        <button class="btn btn-blue btn-sm" onclick="openKakaoNavi(${stop.lat||'null'},${stop.lng||'null'},'${esc(stop.clientName)}')">🗺️ 카카오</button>
        <button class="btn btn-gray btn-sm" onclick="openTmap(${stop.lat||'null'},${stop.lng||'null'},'${esc(stop.clientName)}')">🗺️ T맵</button>
        ${callBtn}
        <button class="btn btn-sm" style="background:#e67e22;color:#fff" onclick="markProblem(${idx})">⚠️ 문제</button>
        <button class="btn btn-green btn-sm" onclick="markDone(${idx})">✅ 납품완료</button>
      </div>`;
    }
    html += '</div>';
  });

  if (shown === 0) {
    const tl = { am: '오전차', pm: '오후차' }[TRIP_FILTER] || '';
    html = `<div class="empty" style="padding:30px 20px"><div class="icon">🚚</div><div>${tl}에 해당하는 거래처가 없습니다<br><small>거래처 이름 옆 ⏰시간대를 눌러 오전/오후를 지정하세요</small></div></div>`;
  }
  list.innerHTML = html;
  updateProgress();
  // 지도가 열려 있으면 핀·경로도 갱신
  if (document.getElementById('mapPanel').style.display !== 'none' && DMAP) renderDriverMap();
}

// 순서 수동 조정 (위/아래로 한 칸)
function moveStop(idx, dir) {
  const j = idx + dir;
  if (j < 0 || j >= STOPS.length) return;
  if (STOPS[j].done || STOPS[j].warehouseHere) return;  // 완료/창고 자리와는 안 바꿈
  const t = STOPS[idx]; STOPS[idx] = STOPS[j]; STOPS[j] = t;
  ROAD_PATH = null;            // 순서 바뀌면 도로경로·도착시간 무효(다시 최적화 눌러 갱신)
  STOPS.forEach(s => { s.eta = null; });
  renderStops();
}

// 배송 메모 수정 — delivery_customers.delivery_note 에 저장
async function editNote(idx) {
  const stop = STOPS[idx];
  const cur = stop.note || '';
  const val = prompt(`[${stop.clientName}] 배송 메모\n(예: 뒷문으로, 주차는 옆골목, 오전만 가능)`, cur);
  if (val === null) return;                 // 취소
  const note = val.trim();
  stop.note = note;
  renderStops();
  try {
    const { error } = await sb.from('delivery_customers').update({ delivery_note: note }).eq('name', stop.dbName);
    if (error) throw error;
    showBanner('배송 메모 저장됨', 'ok');
  } catch(e) {
    showBanner('메모 저장 실패 — Supabase에 delivery_note 칸을 먼저 추가하세요', 'warn');
  }
}

// 배송 시간대 순환: 무관 → 오전 → 오후 → 무관
async function cycleTimeWindow(idx) {
  const stop = STOPS[idx];
  const next = { '': 'am', 'am': 'pm', 'pm': '' }[stop.tw || ''];
  stop.tw = next;
  renderStops();
  try {
    const { error } = await sb.from('delivery_customers').update({ delivery_time_window: next }).eq('name', stop.dbName);
    if (error) throw error;
    const lbl = { am: '오전', pm: '오후', '': '시간무관' }[next];
    showBanner(`${stop.clientName} → ${lbl}`, 'ok');
  } catch(e) {
    showBanner('시간대 저장 실패 — Supabase에 delivery_time_window 칸을 먼저 추가하세요', 'warn');
  }
}

// 좌표 보정: 현재 GPS 위치를 이 거래처 좌표로 저장 (실제 문 앞에서 누르면 정확)
async function fixLocation(idx) {
  const stop = STOPS[idx];
  if (!CUR_LAT || !CUR_LNG) { showBanner('GPS를 먼저 켜주세요 (현재 위치가 필요)', 'warn'); return; }
  if (!confirm(`[${stop.clientName}]의 위치를 지금 내 GPS 위치로 저장할까요?\n(거래처 문 앞에서 누르면 정확합니다)`)) return;
  stop.lat = CUR_LAT; stop.lng = CUR_LNG;
  renderStops();
  try {
    const { error } = await sb.from('delivery_customers').update({ lat: CUR_LAT, lng: CUR_LNG }).eq('name', stop.dbName);
    if (error) throw error;
    showBanner(`${stop.clientName} 위치 저장됨`, 'ok');
  } catch(e) {
    showBanner('위치 저장 실패: ' + (e.message||e), 'warn');
  }
}

function updateProgress() {
  const total = STOPS.length;
  const done = STOPS.filter(s => s.done).length;
  document.getElementById('progressText').textContent = `${done}/${total} 완료`;
}

// ═══ 경로 지도 (개요용) ═══════════════════════════════
let DMAP = null, DMARKERS = [], DLINE = null, DGPS = null;

function toggleMap() {
  const panel = document.getElementById('mapPanel');
  const showing = panel.style.display !== 'none';
  if (showing) {
    panel.style.display = 'none';
    document.getElementById('mapToggleLabel').textContent = '지도 보기';
    return;
  }
  panel.style.display = 'block';
  document.getElementById('mapToggleLabel').textContent = '지도 닫기';
  ensureDriverMap();
  locateOnce();   // 지도 열면 현위치 한 번 잡아서 핀 표시 (GPS 추적 안 켜도)
}

// 현위치 한 번만 가져와 지도에 핀 — GPS 추적(watch)과 별개
function locateOnce() {
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(
    pos => {
      CUR_LAT = pos.coords.latitude;
      CUR_LNG = pos.coords.longitude;
      if (DMAP) {
        updateGpsDot();
        // 거래처가 없을 때만 현위치로 중심 이동(경로 보기를 방해하지 않게)
        const hasStops = STOPS.some(s => s.lat && s.lng && !s.done && tripMatch(s));
        if (!hasStops) DMAP.setCenter(new kakao.maps.LatLng(CUR_LAT, CUR_LNG));
      }
    },
    () => {},
    { enableHighAccuracy: true, timeout: 8000, maximumAge: 10000 }
  );
}

function ensureDriverMap() {
  const jsKey = cfg('kakao_js_key', '');
  const mapEl = document.getElementById('driverMap');
  const hintEl = document.getElementById('mapHint');
  if (!jsKey) { mapEl.style.display = 'none'; hintEl.style.display = 'block'; return; }
  mapEl.style.display = 'block'; hintEl.style.display = 'none';

  if (DMAP) { setTimeout(() => { DMAP.relayout(); renderDriverMap(); }, 100); return; }

  if (typeof kakao === 'undefined' || !kakao.maps || !kakao.maps.Map) {
    // SDK 로드 (한 번만)
    if (!document.getElementById('kakaoSdkDriver')) {
      const s = document.createElement('script');
      s.id = 'kakaoSdkDriver';
      s.src = `//dapi.kakao.com/v2/maps/sdk.js?appkey=${jsKey}&autoload=false`;
      s.onload = () => kakao.maps.load(() => { initDriverMap(); renderDriverMap(); });
      document.head.appendChild(s);
    }
    return;
  }
  initDriverMap();
  renderDriverMap();
}

function initDriverMap() {
  if (DMAP) return;
  DMAP = new kakao.maps.Map(document.getElementById('driverMap'), {
    center: new kakao.maps.LatLng(37.41, 127.13),
    level: 7
  });
}

function renderDriverMap() {
  if (!DMAP || typeof kakao === 'undefined') return;
  // 기존 마커·선 제거
  DMARKERS.forEach(m => m.setMap(null)); DMARKERS = [];
  if (DLINE) { DLINE.setMap(null); DLINE = null; }

  const bounds = new kakao.maps.LatLngBounds();
  const linePath = [];
  let num = 0;
  let hasAny = false;

  STOPS.forEach(s => {
    if (!s.lat || !s.lng) return;
    if (!tripMatch(s)) return;   // 차수 필터 (지도도 목록과 동일하게)
    hasAny = true;
    const pos = new kakao.maps.LatLng(s.lat, s.lng);
    bounds.extend(pos);
    let label, color;
    if (s.warehouseHere) { label = '🏭'; color = '#e67e22'; }
    else if (s.done)     { label = '✓'; color = '#aaa'; }
    else { num++; label = String(num); color = '#1a3a5c'; linePath.push(pos); }
    const content = `<div title="${esc(s.clientName)}" style="background:${color};color:#fff;min-width:24px;height:24px;padding:0 4px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:bold;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.4)">${label}</div>`;
    const ov = new kakao.maps.CustomOverlay({ position: pos, content, yAnchor: 0.5, xAnchor: 0.5 });
    ov.setMap(DMAP);
    DMARKERS.push(ov);
  });

  // 경로선: 실제 도로(ROAD_PATH) 우선, 없으면 직선
  let lineCoords = null;
  if (ROAD_PATH && ROAD_PATH.length >= 2) {
    lineCoords = ROAD_PATH.map(p => new kakao.maps.LatLng(p.lat, p.lng));
  } else if (linePath.length >= 2) {
    lineCoords = linePath;
  }
  if (lineCoords) {
    DLINE = new kakao.maps.Polyline({ path: lineCoords, strokeWeight: 5, strokeColor: '#2d8cff', strokeOpacity: 0.85, strokeStyle: 'solid' });
    DLINE.setMap(DMAP);
  }

  updateGpsDot(bounds);
  if (hasAny && !bounds.isEmpty()) DMAP.setBounds(bounds);
}

// 내 현재 위치 핀(또렷한 라벨) — GPS 갱신 때마다 이동
function updateGpsDot(boundsToExtend) {
  if (!DMAP || typeof kakao === 'undefined' || !CUR_LAT || !CUR_LNG) return;
  const gpos = new kakao.maps.LatLng(CUR_LAT, CUR_LNG);
  const pinHtml = '<div style="display:flex;flex-direction:column;align-items:center">'
    + '<div style="background:#2d8cff;color:#fff;font-size:11px;font-weight:bold;padding:2px 7px;border-radius:10px;white-space:nowrap;box-shadow:0 1px 3px rgba(0,0,0,.4)">📍 현위치</div>'
    + '<div style="width:14px;height:14px;border-radius:50%;background:#2d8cff;border:3px solid #fff;box-shadow:0 0 0 4px rgba(45,140,255,.3);margin-top:1px"></div>'
    + '</div>';
  if (DGPS) { DGPS.setPosition(gpos); }
  else {
    DGPS = new kakao.maps.CustomOverlay({
      position: gpos, yAnchor: 1, xAnchor: 0.5, zIndex: 10,
      content: pinHtml
    });
    DGPS.setMap(DMAP);
  }
  if (boundsToExtend) boundsToExtend.extend(gpos);
}

// ═══ GPS 추적 ═══════════════════════════════════════
let GPS_ON = false;
let CUR_SPEED = null;   // 현재 속도(m/s) — 자동완료 오작동 방지용
let BG_WATCHER = null;  // 안드로이드 앱 백그라운드 위치 watcher id

// 안드로이드 앱(Capacitor) 안에서 실행 중인지 + 백그라운드 위치 플러그인
function bgPlugin() {
  try { return window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.BackgroundGeolocation; }
  catch(e) { return null; }
}

// 위치 한 건 처리 (웹·앱 공통)
function onLocation(lat, lng, speed, suffix) {
  CUR_LAT = lat; CUR_LNG = lng; CUR_SPEED = (speed == null ? null : speed);
  document.getElementById('gpsStatus').textContent = `GPS ${lat.toFixed(4)}, ${lng.toFixed(4)}${suffix || ''}`;
  updateGpsDot();        // 지도 위 내 위치 핀 이동
  checkAutoArrival();    // 거래처 도착하면 자동 납품완료
  sendLocationToSupabase();  // 현황판으로 위치 전송
}

function toggleGps() {
  if (GPS_ON) { stopGps(); }
  else { startGps(); }
}

function startGps() {
  GPS_ON = true;
  document.getElementById('gpsToggleLabel').textContent = '끄기';
  document.getElementById('gpsDot').classList.add('on');
  document.getElementById('gpsStatus').textContent = 'GPS 켜짐';
  requestWakeLock();   // 추적 중엔 화면 안 꺼지게

  const BG = bgPlugin();
  if (BG) {
    // 📱 안드로이드 앱 — 백그라운드 추적(화면 꺼져도/주머니에 넣어도)
    document.getElementById('gpsStatus').textContent = 'GPS 켜짐 (백그라운드 추적)';
    BG.addWatcher({
      backgroundMessage: '배송 위치를 기록 중입니다',
      backgroundTitle: '월성푸드 배송 — 위치 추적 중',
      requestPermissions: true,
      stale: false,
      distanceFilter: 15
    }, (location, error) => {
      if (error) {
        document.getElementById('gpsStatus').textContent = 'GPS 권한 필요: ' + (error.code || error.message || '');
        if (error.code === 'NOT_AUTHORIZED') {
          if (confirm('위치를 "항상 허용"으로 켜야 배송 추적이 됩니다. 설정 화면을 열까요?')) {
            BG.openSettings();
          }
        }
        return;
      }
      if (location) onLocation(location.latitude, location.longitude, location.speed, ' (백그라운드)');
    }).then(id => { BG_WATCHER = id; }).catch(()=>{});
  } else if (navigator.geolocation) {
    // 🌐 웹(브라우저) — 화면 열어둔 동안만 추적
    GPS_ID = navigator.geolocation.watchPosition(
      pos => onLocation(pos.coords.latitude, pos.coords.longitude, pos.coords.speed, ''),
      err => { document.getElementById('gpsStatus').textContent = 'GPS 오류: ' + err.message; },
      { enableHighAccuracy: true, timeout: 10000, maximumAge: 5000 }
    );
  } else {
    showBanner('이 기기에서 GPS를 지원하지 않습니다', 'err');
  }

  // 30초마다 위치 Supabase 전송 (멈춰있을 때도 갱신)
  GPS_SEND_TIMER = setInterval(sendLocationToSupabase, 30000);
}

function stopGps() {
  GPS_ON = false;
  const BG = bgPlugin();
  if (BG && BG_WATCHER) { try { BG.removeWatcher({ id: BG_WATCHER }); } catch(e){} BG_WATCHER = null; }
  if (GPS_ID !== null) { navigator.geolocation.clearWatch(GPS_ID); GPS_ID = null; }
  if (GPS_SEND_TIMER) { clearInterval(GPS_SEND_TIMER); GPS_SEND_TIMER = null; }
  document.getElementById('gpsToggleLabel').textContent = '켜기';
  document.getElementById('gpsDot').classList.remove('on');
  document.getElementById('gpsStatus').textContent = 'GPS 꺼짐';
  releaseWakeLock();
}

// ═══ 화면 항상 켜기 (Wake Lock) ═══════════════════════
let WAKE_LOCK = null;
async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      WAKE_LOCK = await navigator.wakeLock.request('screen');
      WAKE_LOCK.addEventListener('release', () => { WAKE_LOCK = null; });
    }
  } catch(e) { /* 미지원·거부 시 무시 */ }
}
function releaseWakeLock() {
  try { if (WAKE_LOCK) WAKE_LOCK.release(); } catch(e) {}
  WAKE_LOCK = null;
}
// 화면 잠깐 가렸다 돌아오면(내비 다녀오면) 다시 켜기
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && GPS_ON && !WAKE_LOCK) requestWakeLock();
});

async function sendLocationToSupabase() {
  if (!CUR_LAT || !CUR_LNG || !DRIVER) return;
  const date = document.getElementById('dateInput').value;
  try {
    await sb.from('driver_locations').upsert({
      driver_name: DRIVER,
      session_date: date,
      lat: CUR_LAT,
      lng: CUR_LNG,
      updated_at: new Date().toISOString()
    }, { onConflict: 'driver_name,session_date' });
  } catch(e) { console.warn('위치 전송 실패:', e.message); }
}

// ═══ 배너 ════════════════════════════════════════════
function showBanner(msg, type) {
  const area = document.getElementById('bannerArea');
  const cls = type === 'warn' ? 'banner-warn' : type === 'err' ? 'banner-err' : 'banner-ok';
  area.innerHTML = `<div class="banner ${cls}">${msg}</div>`;
}
function clearBanner() { document.getElementById('bannerArea').innerHTML = ''; }

// ═══ 설정 모달 ═══════════════════════════════════════
function openSettings() {
  document.getElementById('cfg_depot').value   = cfg('depot_addr', '');
  document.getElementById('cfg_wh_name').value = cfg('wh_name', '');
  document.getElementById('cfg_wh_addr').value = cfg('wh_addr', '');
  document.getElementById('cfg_wh_close').value = cfg('wh_close', '11:20');
  document.getElementById('cfg_kakao_key').value = cfg('kakao_key', '');
  document.getElementById('cfg_kakao_js_key').value = cfg('kakao_js_key', '');
  document.getElementById('cfg_auto_done').checked = (cfg('auto_done', 'on') === 'on');
  document.getElementById('cfg_drivers').value = cfg('drivers', '홍길동\n김드라이버');
  document.getElementById('settingsModal').classList.add('open');
}
function closeSettings() { document.getElementById('settingsModal').classList.remove('open'); }
function saveSettings() {
  const newDepot = document.getElementById('cfg_depot').value.trim();
  if (newDepot !== cfg('depot_addr', '')) { cfgSet('depot_lat', ''); cfgSet('depot_lng', ''); } // 주소 바뀌면 좌표 캐시 초기화
  cfgSet('depot_addr', newDepot);
  cfgSet('wh_name',    document.getElementById('cfg_wh_name').value.trim());
  cfgSet('wh_addr',    document.getElementById('cfg_wh_addr').value.trim());
  cfgSet('wh_close',   document.getElementById('cfg_wh_close').value);
  cfgSet('kakao_key',  document.getElementById('cfg_kakao_key').value.trim());
  cfgSet('kakao_js_key', document.getElementById('cfg_kakao_js_key').value.trim());
  cfgSet('auto_done',  document.getElementById('cfg_auto_done').checked ? 'on' : 'off');
  cfgSet('drivers',    document.getElementById('cfg_drivers').value.trim());
  closeSettings();
  showBanner('설정 저장됨', 'ok');
  // 지도 패널이 열려 있으면 새 키로 다시 시도
  if (document.getElementById('mapPanel').style.display !== 'none') ensureDriverMap();
}

// ═══ 초기화 ══════════════════════════════════════════
initLogin();
</script>
